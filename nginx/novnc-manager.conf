# nginx reverse proxy config for Apparition
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/novnc-manager
#   2. Replace YOUR_DOMAIN with your actual domain (two places below)
#   3. Run: certbot --nginx -d YOUR_DOMAIN
#   4. ln -s /etc/nginx/sites-available/novnc-manager /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx
#
# For local testing without SSL, skip steps 3 and use the HTTP-only block at
# the bottom of this file instead.

# Upgrade HTTP connections to WebSocket where applicable (required for noVNC).
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# ── HTTPS (production) ────────────────────────────────────────────────────────

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL — populated by: certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Large body limit for Firefox profile tar.gz uploads
    client_max_body_size 512m;

    # Long timeouts to keep VNC WebSocket connections alive
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 10s;

    # Admin panel: only reachable via localhost port-forwarding.
    # Direct connections from the internet are blocked here.
    # To access: ssh -L 8080:localhost:80 yourserver  then browse http://localhost:8080/admin
    location /admin {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Real IP forwarding (read by Express trust proxy)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (noVNC connects via /vnc/:sessionId/websockify)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ── HTTP-only (local testing, no SSL) ─────────────────────────────────────────
# Uncomment this block and comment out the two blocks above when testing locally.

